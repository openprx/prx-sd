[advisories]
ignore = [
    "RUSTSEC-2023-0071",  # rsa: yara-x transitive dep, no patched version available
    "RUSTSEC-2024-0384",  # instant: notify transitive dep (unmaintained)
    "RUSTSEC-2025-0119",  # number_prefix: indicatif transitive dep (unmaintained)
    "RUSTSEC-2025-0141",  # bincode: heed/yara-x transitive dep (unmaintained)
]
informational_warnings = ["unmaintained"]
severity_threshold = "low"

[database]
fetch = true
stale = false

[output]
deny = ["unmaintained"]
format = "terminal"
quiet = false
show_tree = true

[yanked]
enabled = true
update_index = true
