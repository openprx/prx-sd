# cargo-deny configuration — OpenPRX standard v2
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true
exclude-dev = false

[output]
feature-depth = 1

# ===== 安全漏洞 =====
[advisories]
yanked = "deny"
unmaintained = "all"
unsound = "workspace"
ignore = [
    # wasmtime CVEs resolved by upgrading to v41.0.4 (2026-03-22)
    # Review all ignores by: 2026-06-01
    { id = "RUSTSEC-2023-0071", reason = "rsa: yara-x transitive dep, no safe upgrade available" },
    { id = "RUSTSEC-2024-0384", reason = "instant: notify transitive dep (unmaintained), no safe upgrade" },
    { id = "RUSTSEC-2025-0119", reason = "number_prefix: indicatif transitive dep (unmaintained), no safe upgrade" },
    { id = "RUSTSEC-2025-0141", reason = "bincode: heed transitive dep (unmaintained), no safe upgrade" },
]

# ===== 许可证合规 =====
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
    "bzip2-1.0.6",
]
confidence-threshold = 0.8
include-dev = false
include-build = true
unused-allowed-license = "allow"

[licenses.private]
ignore = true

# ===== 依赖禁用 =====
[bans]
multiple-versions = "warn"
wildcards = "warn"
allow-wildcard-paths = true
allow-workspace = true
highlight = "all"

deny = [
    { crate = "openssl", reason = "Use rustls-tls instead", use-instead = "rustls" },
    { crate = "openssl-sys", reason = "Use rustls-tls instead" },
]

[[bans.features]]
crate = "reqwest"
deny = ["native-tls", "native-tls-vendored"]

[bans.workspace-dependencies]
duplicates = "warn"
unused = "warn"

# ===== 来源可信 =====
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
]
allow-git = []
